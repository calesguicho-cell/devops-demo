name: Server Check CI

on:
  push:
    branches: [ master ]

jobs:
  run-check-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run check server script
        run: python check_server.py